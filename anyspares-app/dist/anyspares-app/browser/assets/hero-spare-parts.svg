<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d9bf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5f99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bgGradient)"/>
  
  <!-- Engine Block -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="160" height="140" fill="url(#metalGradient)" stroke="#333" stroke-width="2" rx="8"/>
    <!-- Cylinders -->
    <circle cx="40" cy="40" r="25" fill="#b0b0b0" stroke="#333" stroke-width="1"/>
    <circle cx="120" cy="40" r="25" fill="#b0b0b0" stroke="#333" stroke-width="1"/>
    <circle cx="40" cy="110" r="25" fill="#b0b0b0" stroke="#333" stroke-width="1"/>
    <circle cx="120" cy="110" r="25" fill="#b0b0b0" stroke="#333" stroke-width="1"/>
    <!-- Spark plugs -->
    <circle cx="40" cy="40" r="8" fill="#fbbf24"/>
    <circle cx="120" cy="40" r="8" fill="#fbbf24"/>
    <circle cx="40" cy="110" r="8" fill="#fbbf24"/>
    <circle cx="120" cy="110" r="8" fill="#fbbf24"/>
  </g>
  
  <!-- Brake Pad -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="100" height="80" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="4"/>
    <rect x="10" y="10" width="80" height="60" fill="#ff6b6b" stroke="#e74c3c" stroke-width="1" rx="2"/>
    <!-- Friction dots -->
    <circle cx="25" cy="25" r="3" fill="#333"/>
    <circle cx="45" cy="25" r="3" fill="#333"/>
    <circle cx="65" cy="25" r="3" fill="#333"/>
    <circle cx="25" cy="50" r="3" fill="#333"/>
    <circle cx="45" cy="50" r="3" fill="#333"/>
    <circle cx="65" cy="50" r="3" fill="#333"/>
  </g>
  
  <!-- Battery -->
  <g transform="translate(100, 270)">
    <rect x="0" y="0" width="80" height="100" fill="#0f172a" stroke="#1e293b" stroke-width="2" rx="4"/>
    <!-- Terminals -->
    <rect x="15" y="-15" width="15" height="20" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
    <rect x="50" y="-15" width="15" height="20" fill="#a16207" stroke="#b45309" stroke-width="1"/>
    <!-- Label -->
    <text x="40" y="55" font-size="16" font-weight="bold" fill="#1d9bf0" text-anchor="middle">12V</text>
    <text x="40" y="80" font-size="10" fill="#94a3b8" text-anchor="middle">Battery</text>
  </g>
  
  <!-- Oil Filter -->
  <g transform="translate(280, 280)">
    <circle cx="40" cy="40" r="35" fill="url(#metalGradient)" stroke="#333" stroke-width="2"/>
    <!-- Filter housing -->
    <circle cx="40" cy="40" r="25" fill="#8b7355" stroke="#333" stroke-width="1"/>
    <!-- Thread -->
    <rect x="35" y="0" width="10" height="15" fill="#666" stroke="#333" stroke-width="1"/>
    <!-- Filter element -->
    <circle cx="40" cy="40" r="15" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
    <line x1="40" y1="25" x2="40" y2="55" stroke="#333" stroke-width="1"/>
    <line x1="25" y1="40" x2="55" y2="40" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Decorative accent circles -->
  <circle cx="450" cy="50" r="15" fill="url(#accentGradient)" opacity="0.3"/>
  <circle cx="30" cy="350" r="20" fill="url(#accentGradient)" opacity="0.2"/>
  
  <!-- Text overlay -->
  <text x="250" y="380" font-size="18" font-weight="600" fill="#1e293b" text-anchor="middle">Genuine Auto Parts</text>
</svg>