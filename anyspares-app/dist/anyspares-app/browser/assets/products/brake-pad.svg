<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brakePadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="250" height="250" fill="#f8fafc"/>
  
  <!-- Metal backing plate -->
  <rect x="30" y="50" width="190" height="150" fill="url(#metalBase)" stroke="#444" stroke-width="2" rx="8"/>
  
  <!-- Brake pad friction material -->
  <rect x="50" y="70" width="150" height="110" fill="url(#brakePadGrad)" stroke="#800000" stroke-width="1" rx="4"/>
  
  <!-- Friction dots pattern -->
  <circle cx="80" cy="95" r="4" fill="#333"/>
  <circle cx="125" cy="95" r="4" fill="#333"/>
  <circle cx="170" cy="95" r="4" fill="#333"/>
  <circle cx="80" cy="135" r="4" fill="#333"/>
  <circle cx="125" cy="135" r="4" fill="#333"/>
  <circle cx="170" cy="135" r="4" fill="#333"/>
  
  <!-- Mounting holes -->
  <circle cx="50" cy="70" r="6" fill="#666" stroke="#333" stroke-width="1"/>
  <circle cx="200" cy="70" r="6" fill="#666" stroke="#333" stroke-width="1"/>
  <circle cx="50" cy="180" r="6" fill="#666" stroke="#333" stroke-width="1"/>
  <circle cx="200" cy="180" r="6" fill="#666" stroke="#333" stroke-width="1"/>
  
  <!-- Product label -->
  <text x="125" y="225" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">Brake Pad Set</text>
</svg>