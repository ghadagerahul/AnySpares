<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalCyl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#909090;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="250" height="250" fill="#f8fafc"/>
  
  <!-- Oil filter body (cylinder) -->
  <ellipse cx="125" cy="90" rx="50" ry="15" fill="#9a9a9a" stroke="#333" stroke-width="1"/>
  <rect x="75" y="90" width="100" height="90" fill="url(#metalCyl)" stroke="#333" stroke-width="2"/>
  <ellipse cx="125" cy="180" rx="50" ry="15" fill="#7a7a7a" stroke="#333" stroke-width="1"/>
  
  <!-- Filter housing (inner) -->
  <rect x="90" y="105" width="70" height="60" fill="url(#filterGrad)" stroke="#333" stroke-width="1" rx="3"/>
  
  <!-- Thread (top) -->
  <rect x="110" y="75" width="30" height="18" fill="#888" stroke="#333" stroke-width="1"/>
  <line x1="115" y1="78" x2="115" y2="88" stroke="#555" stroke-width="1"/>
  <line x1="125" y1="78" x2="125" y2="88" stroke="#555" stroke-width="1"/>
  <line x1="135" y1="78" x2="135" y2="88" stroke="#555" stroke-width="1"/>
  
  <!-- Filter element lines -->
  <line x1="125" y1="115" x2="125" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="105" y1="135" x2="145" y2="135" stroke="#333" stroke-width="1.5"/>
  
  <!-- Gasket -->
  <ellipse cx="125" cy="180" rx="52" ry="17" fill="none" stroke="#d97706" stroke-width="2"/>
  
  <!-- Product label -->
  <text x="125" y="225" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">Oil Filter</text>
</svg>