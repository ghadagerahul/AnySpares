<div class="container">
    <!-- Back Button -->
    <button class="back-btn" (click)="goBack()">← Back</button>

    <h2 class="title">Select Spare Category</h2>
    <p class="subtitle">Choose a category for Honda Activa spare parts</p>

    <!-- Search Bar -->
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search categories..." class="search-bar" />

    <!-- Category Grid -->
    <div class="category-grid">
        <div class="category-card" *ngFor="let category of filteredCategories()" (click)="onCategorySelect(category)">
            <img [src]="category.image" alt="{{ category.name }}" class="category-icon" />
            <h3 class="category-title">{{ category.name }}</h3>
            <p class="category-desc">{{ category.description }}</p>
            <a href="" (click)="goToProduct()"> Click here</a>
        </div>
    </div>
</div>
