<h2 mat-dialog-title class="dialog-title">{{ data.title }}</h2>
<mat-dialog-content class="dialog-content">
  <p class="dialog-message">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button  (click)="onCancel()" class="cancel-btn">{{ cancelBtnText }}</button>
  <button mat-raised-button color="primary" (click)="onConfirm()" class="confirm-btn">{{ confirmBtnText }}</button>
</mat-dialog-actions>
