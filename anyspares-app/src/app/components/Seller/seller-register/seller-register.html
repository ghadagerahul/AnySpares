<div class="register-page">

    <!-- TOP NAV -->
    <div class="top-nav">
        <div class="nav-buttons">
            <button>Seller Login</button>
            <button class="active">Seller Register</button>
            <button>User Login</button>
        </div>

        <div class="theme-toggle">🌙</div>
    </div>

    <!-- HEADER -->
    <div class="page-header">
        <div class="icon-circle">🏪</div>
        <h2>Become a Seller on AnySpares</h2>
        <p>Join our marketplace and reach thousands of customers</p>
    </div>

    <!-- FORM CARD -->
    <div class="form-card">

        <!-- Business Info -->
        <h3 class="section-title">Business Information</h3>

        <div class="form-group">
            <label>Business Name *</label>
            <input type="text" placeholder="Enter your business name" />
        </div>

        <div class="form-group">
            <label>Owner Name *</label>
            <input type="text" placeholder="Enter owner's full name" />
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="text" placeholder="10-digit number" />
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" placeholder="your@email.com" />
            </div>
        </div>

        <div class="form-group">
            <label>GST Number <span>(Optional)</span></label>
            <input type="text" placeholder="Enter GST number (if applicable)" />
        </div>

        <!-- Address -->
        <h3 class="section-title">Shop Address</h3>

        <div class="form-group">
            <label>Complete Address *</label>
            <textarea rows="3" placeholder="Enter complete shop address"></textarea>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>City *</label>
                <input type="text" placeholder="Enter city" />
            </div>

            <div class="form-group">
                <label>Pincode *</label>
                <input type="text" placeholder="Enter pincode" />
            </div>
        </div>

        <!-- Vehicle Types -->
        <h3 class="section-title">Vehicle Types Supported</h3>
        <p class="hint">Select all vehicle types you support *</p>

        <div class="checkbox-grid">
            <label class="checkbox-card">
                <input type="checkbox" />
                Two Wheeler
            </label>

            <label class="checkbox-card">
                <input type="checkbox" />
                Three Wheeler
            </label>

            <label class="checkbox-card">
                <input type="checkbox" />
                Four Wheeler
            </label>

            <label class="checkbox-card">
                <input type="checkbox" />
                Heavy Vehicle
            </label>
        </div>

        <!-- Password -->
        <h3 class="section-title">Create Password</h3>

        <div class="grid-2">
            <div class="form-group">
                <label>Password *</label>
                <input type="password" placeholder="Min. 8 characters" />
            </div>

            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" placeholder="Re-enter password" />
            </div>
        </div>

        <!-- SUBMIT -->
        <button class="submit-btn">
            Register as Seller 🏪
        </button>

        <p class="login-link">
            Already a seller? <a href="#">Login Here</a>
        </p>
    </div>

    <footer>
        © 2025 AnySpares. All rights reser
