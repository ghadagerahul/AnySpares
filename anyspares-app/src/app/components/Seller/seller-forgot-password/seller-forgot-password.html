<div class="forgot-password-layout">
  <div class="forgot-card">
    <h2>Seller Forgot Password</h2>
    <p>Provide your seller email or mobile number to receive reset instructions.</p>

    <div *ngIf="message" class="alert" [ngClass]="messageType">
      {{ message }}
    </div>

    <div class="form-group">
      <label for="emailOrMobile">Email or Mobile</label>
      <input id="emailOrMobile" [(ngModel)]="emailOrMobile" name="emailOrMobile" type="text" placeholder="seller@example.com or 9876543210" />
    </div>

    <button class="btn-submit" (click)="submitForgotPassword()" [disabled]="loading || otpSent">
      {{ loading ? 'Sending...' : 'Send OTP' }}
    </button>

    <div *ngIf="otpSent" class="form-group otp-group">
      <label for="otp">OTP</label>
      <input id="otp" [(ngModel)]="otp" name="otp" type="text" placeholder="Enter OTP" />
      <button class="btn-submit" (click)="submitOtp()" [disabled]="otpLoading">
        {{ otpLoading ? 'Verifying...' : 'Submit OTP' }}
      </button>
      <div class="resend-section" *ngIf="!otpVerified">
        <button class="btn-resend" (click)="resendOtp()" [disabled]="!resendEnabled">
          {{ resendEnabled ? 'Resend OTP' : `Resend in ${resendTimer}s` }}
        </button>
      </div>
    </div>

    <div *ngIf="otpVerified && !passwordResetSuccess" class="form-group password-group">
      <label for="newPassword">New Password</label>
      <input id="newPassword" [(ngModel)]="newPassword" name="newPassword" type="password" placeholder="Enter new password" />

      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm new password" />

      <button class="btn-submit" (click)="submitResetPassword()" [disabled]="resetLoading">
        {{ resetLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </div>

    <div *ngIf="passwordResetSuccess" class="success-section">
      <p>Password reset successfully! You can now login with your new password.</p>
      <button class="btn-submit" (click)="goToLogin()">Go to Seller Login</button>
    </div>

    <app-login-navigator userLoginLabel="Back to User Login" sellerLoginLabel="Back to Seller Login"></app-login-navigator>
  </div>
</div>
