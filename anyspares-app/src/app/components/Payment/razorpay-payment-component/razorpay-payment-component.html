<div class="payment-container">
    <h2>Secure Payment</h2>
    <form [formGroup]="paymentForm" (ngSubmit)="pay()" class="payment-form">
        <div class="form-group">
            <label for="amount">Amount (INR):</label>
            <input id="amount" type="number" formControlName="amount" placeholder="Enter amount" class="form-control"
                [class.error]="paymentForm.get('amount')?.invalid && paymentForm.get('amount')?.touched" />
            <div class="error-message" *ngIf="paymentForm.get('amount')?.invalid && paymentForm.get('amount')?.touched">
                Amount is required and must be at least 1.
            </div>
        </div>

        <div class="form-group">
            <label for="currency">Currency:</label>
            <select id="currency" formControlName="currency" class="form-control">
                <option value="INR">INR</option>
                <option value="USD">USD</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description:</label>
            <input id="description" type="text" formControlName="description" placeholder="Payment description"
                class="form-control"
                [class.error]="paymentForm.get('description')?.invalid && paymentForm.get('description')?.touched" />
            <div class="error-message"
                *ngIf="paymentForm.get('description')?.invalid && paymentForm.get('description')?.touched">
                Description is required.
            </div>
        </div>

        <button type="submit" [disabled]="loading || paymentForm.invalid" class="pay-button">
            {{ loading ? 'Processing Payment...' : 'Pay Now' }}
        </button>
    </form>

    <div class="message" *ngIf="message"
        [ngClass]="{'success': message.includes('successful'), 'error': message.includes('failed') || message.includes('cancelled')}">
        {{ message }}
    </div>
</div>
