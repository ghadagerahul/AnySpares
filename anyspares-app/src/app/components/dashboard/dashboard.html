<div class="main-wrapper">
    <app-navbar-component></app-navbar-component>

    <!-- VEHICLE CARDS -->
    <div class="container-fluid p-3 p-md-4">
        <div class="row g-3">
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="vehicle-card bg-gradient-blue">
                    <i class="bi bi-bicycle card-icon"></i>
                    <h5>Two-Wheeler</h5>
                    <p>Motorbikes, Scooters & Mopeds</p>
                    <a (click)="goToTwoWheelers()">click here</a>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="vehicle-card bg-gradient-green">
                    <i class="bi bi-truck-front card-icon"></i>
                    <h5>Three-Wheeler</h5>
                    <p>Auto-rickshaws & Cargo Trikes</p>
                    <a (click)="goToThreeWheelers()">click here</a>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="vehicle-card bg-gradient-orange">
                    <i class="bi bi-car-front-fill card-icon"></i>
                    <h5>Four-Wheeler</h5>
                    <p>Cars, SUVs & Vans</p>
                    <a (click)="goToFourWheelers()">click here</a>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="vehicle-card bg-gradient-purple">
                    <i class="bi bi-truck card-icon"></i>
                    <h5>Heavy Vehicles</h5>
                    <p>Trucks, Buses & Construction</p>
                    <a (click)="goToHeavyVehicles()">click here</a>
                </div>
            </div>
        </div>
    </div>
