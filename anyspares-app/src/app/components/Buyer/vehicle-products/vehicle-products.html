<div class="product-grid">
  <div class="product-card" *ngFor="let product of products">
    <img style="width: 130px; height: auto;" [src]="product.imageUrl" [alt]="product.name" />
    <h3>{{ product.name }}</h3>
    <p class="type" [ngClass]="product.type.toLowerCase()">{{ product.type }}</p>
    <p class="rating">⭐ {{ product.rating }} ({{ product.reviews }} reviews)</p>
    <div class="price">
      <span class="discounted">₹{{ product.discountedPrice }}</span>
      <span class="original">₹{{ product.originalPrice }}</span>
    </div>
    <span class="badge">{{ product.discount }}% OFF</span>
  </div>
</div>
