<div class="main-wrapper">
    <app-navbar-component></app-navbar-component>

    <!-- VEHICLE CARDS -->
    <div class="container-fluid p-3 p-md-4">
        <div class="row g-3">
            <div class="col-12 col-sm-6 col-lg-3" *ngFor="let category of vehicleCategories">
                <div class="vehicle-card" [ngClass]="category.gradientClass" (click)="navigateToCategory(category.route)">
                    <i class="bi card-icon" [ngClass]="category.icon"></i>
                    <h5>{{ category.name }}</h5>
                    <p>{{ category.description }}</p>
                    <a  (click)="navigateToCategory(category.name); $event.preventDefault()">Explore</a>
                </div>
            </div>
        </div>
    </div>
</div>
