<div class="main-wrapper">
    <app-navbar-component></app-navbar-component>

    <!-- VEHICLE CARDS -->
    <div class="container-fluid p-3 p-md-4">
        <div class="row g-3">
            <div class="col-3" *ngFor="let category of vehicleCategories">
                <button class="vehicle-card" [ngClass]="category.gradientClass" (click)="navigateToCategory(category)">
                    <i class="bi card-icon" [ngClass]="category.icon"></i>
                    <h5
                        style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
                        {{ category.name }}</h5>
                    <p>{{ category.description }}</p>
                    <span>Explore</span>
                </button>
            </div>
        </div>
    </div>
</div>
