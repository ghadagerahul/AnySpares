<div class="forgot-password-layout">
  <div class="forgot-card">
    <h2>Forgot Password</h2>
    <p>Enter your registered email or mobile number and we will send password reset instructions.</p>

    <div *ngIf="message" class="alert" [ngClass]="messageType">
      {{ message }}
    </div>

    <div class="form-group">
      <label for="emailOrMobile">Email or Mobile</label>
      <input id="emailOrMobile" [(ngModel)]="emailOrMobile" name="emailOrMobile" type="text" placeholder="you@example.com or 9876543210" />
    </div>

    <button class="btn-submit" (click)="submitForgotPassword()" [disabled]="loading">
      {{ loading ? 'Sending...' : 'Send Reset Link' }}
    </button>

    <app-login-navigator></app-login-navigator>
  </div>
</div>
