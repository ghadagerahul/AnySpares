<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terminalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="250" height="250" fill="#f8fafc"/>
  
  <!-- Battery body -->
  <rect x="50" y="30" width="150" height="160" fill="url(#batteryGrad)" stroke="#000" stroke-width="2" rx="8"/>
  
  <!-- Top surface rim -->
  <ellipse cx="125" cy="32" rx="75" ry="8" fill="#2a2a2a" stroke="#000" stroke-width="1"/>
  
  <!-- Positive terminal -->
  <rect x="90" y="5" width="18" height="30" fill="url(#terminalGrad)" stroke="#d97706" stroke-width="2" rx="2"/>
  <circle cx="99" cy="12" r="4" fill="#fef3c7"/>
  
  <!-- Negative terminal -->
  <rect x="142" y="8" width="16" height="25" fill="#a0a0a0" stroke="#333" stroke-width="2" rx="2"/>
  <circle cx="150" cy="14" r="3" fill="#d0d0d0"/>
  
  <!-- Battery label/branding -->
  <rect x="65" y="60" width="120" height="15" fill="none" border="1px solid #444"/>
  <text x="125" y="72" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">12V</text>
  
  <!-- Capacity indicator -->
  <text x="125" y="100" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">Battery</text>
  <text x="125" y="120" font-size="13" fill="#64748b" text-anchor="middle">Size: 12V</text>
  
  <!-- Technical specs -->
  <line x1="70" y1="140" x2="180" y2="140" stroke="#444" stroke-width="1"/>
  <text x="75" y="158" font-size="11" fill="#64748b">Premium Quality</text>
  <text x="75" y="173" font-size="11" fill="#64748b">Long Life Cycle</text>
  
  <!-- Highlight on body -->
  <ellipse cx="75" cy="80" rx="8" ry="15" fill="white" opacity="0.1"/>
  
  <!-- Product label -->
  <text x="125" y="230" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">12V Battery</text>
</svg>