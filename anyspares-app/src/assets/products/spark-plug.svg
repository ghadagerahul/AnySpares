<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sparkMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="porcelain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="250" height="250" fill="#f8fafc"/>
  
  <!-- Hex head (top) -->
  <polygon points="85,50 165,50 185,70 165,90 85,90 65,70" fill="url(#sparkMetal)" stroke="#333" stroke-width="2"/>
  <!-- Hex details -->
  <line x1="75" y1="60" x2="85" y2="70" stroke="#444" stroke-width="1"/>
  <line x1="175" y1="60" x2="165" y2="70" stroke="#444" stroke-width="1"/>
  
  <!-- Metal shell -->
  <rect x="85" y="85" width="80" height="80" fill="url(#sparkMetal)" stroke="#333" stroke-width="1.5" rx="3"/>
  
  <!-- Porcelain insulator -->
  <ellipse cx="125" cy="95" rx="28" ry="8" fill="#f0f0f0" stroke="#888" stroke-width="1"/>
  <rect x="97" y="95" width="56" height="70" fill="url(#porcelain)" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="125" cy="165" rx="28" ry="8" fill="#d0d0d0" stroke="#666" stroke-width="1"/>
  
  <!-- Center electrode (gold) -->
  <circle cx="125" cy="120" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <line x1="125" y1="105" x2="125" y2="155" stroke="#e8b923" stroke-width="3"/>
  
  <!-- Ground electrode (bent) -->
  <line x1="153" y1="160" x2="160" y2="180" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <circle cx="160" cy="180" r="5" fill="#fbbf24"/>
  
  <!-- Gap indicator -->
  <line x1="145" y1="170" x2="155" y2="175" stroke="#d97706" stroke-width="2" stroke-dasharray="3,2"/>
  
  <!-- Product label -->
  <text x="125" y="230" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">Spark Plug</text>
</svg>