spring:
  application:
    name: SERVICEGATEWAY

  profiles:
    active: local

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: SELLERSERVICE
          uri: lb://SELLERSERVICE
          predicates:
            - Path=/sellers/**
          filters:
            - StripPrefix=1

        - id: BUYERSERVICE
          uri: lb://BUYERSERVICE
          predicates:
            - Path=/buyers/**
          filters:
            - StripPrefix=1

        - id: THREEWHEELERSERVICE
          uri: lb://THREEWHEELERSERVICE
          predicates:
            - Path=/threewheelers/**
          filters:
            - StripPrefix=1

        - id: SELLERSERVICE
          uri: lb://SELLERSERVICE
          predicates:
            - Path=/sellers/**
          filters:
            - StripPrefix=1

server:
  port: 8181

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
